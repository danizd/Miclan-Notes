version: "3.8"

services:
  miclan-notes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: miclan-notes
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ${NOTES_DIR}:/notes:rw
    environment:
      - PORT=3000
      - NOTES_DIR=/notes
    restart: unless-stopped
